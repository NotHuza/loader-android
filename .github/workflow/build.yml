# This workflow builds an Android APK, signs the release APK, and uploads both debug and release APKs.
name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # Set up Android SDK
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # Make Gradle wrapper executable
    - name: Set execute permissions on gradlew
      run: chmod +x ./gradlew
      
    # Set up Gradle for caching and performance optimization
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9' # Specify Gradle version if needed

    # Build both debug and release APKs with Gradle Wrapper
    - name: Build APKs
      run: ./gradlew assembleDebug assembleRelease

    # Create directories for APKs and tools
    - name: Setup directories
      run: |
        mkdir -p /tmp/build/apks
        mkdir -p /tmp/build/tools

    # Move debug APK to temporary directory
    - name: Move debug APK
      run: mv ./app/build/outputs/apk/debug/app-debug.apk /tmp/build/apks

    # Download uber-apk-signer
    - name: Download uber-apk-signer
      run: wget -nv "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.2.1/uber-apk-signer-1.2.1.jar" -O /tmp/build/tools/uber-apk-signer.jar

    # Sign the release APK using uber-apk-signer
    - name: Sign release APK
      run: java -jar /tmp/build/tools/uber-apk-signer.jar --apks ./app/build/outputs/apk/release/app-release-unsigned.apk --out /tmp/build/apks/

    # Rename the signed release APK
    - name: Rename release APK
      run: mv /tmp/build/apks/app-release-aligned-debugSigned.apk /tmp/build/apks/app-release.apk

    # Upload debug APK as an artifact
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: /tmp/build/apks/app-debug.apk
        retention-days: 30

    # Upload signed release APK as an artifact
    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: /tmp/build/apks/app-release.apk
        retention-days: 30
